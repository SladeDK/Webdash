<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="assets/sladedk-ice.png">
        <script src="https://kit.fontawesome.com/782d4dd7ab.js" crossorigin="anonymous"></script>
        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="backgrounds.css">
        <script src="script.js" defer></script>
        <title>WebDash</title>
    </head>

    <body>
        <!-- Header -->
        <div class="header">
            <img src="assets/sladedk-ice.png" alt="Logo">
            <h1>SladeDK</h1>

            <noscript>
                <div class="noscript-alert">
                    JavaScript is disabled in your browser. Please enable JavaScript to view the full functionality of this website.
                </div>
            </noscript>

            <!-- Pages dropdown -->
            <div class="dropdownPages">
                <button class="dropdownPages-button">
                    <i class="fa-solid fa-bars"></i> Pages
                </button>
                <div class="dropdownPages-content">
                    <a href="https://home.webdash.dk">Home</a>
                    <a href="https://work.webdash.dk">Work</a>
                </div>
            </div>

            <!-- Themes dropdown -->
            <div class="dropdownThemes">
                <button class="dropdownThemes-button">
                    <i class="fa-solid fa-paint-brush"></i> Themes
                </button>
                <div class="dropdownThemes-content">
                    <a href="#" data-bg="bg1">Blank</a>
                    <a href="#" data-bg="bg2">Squares Dotted</a>
                    <a href="#" data-bg="bg3">Webbed</a>
                    <a href="#" data-bg="bg4">Triangle Gradient</a>
                    <a href="#" data-bg="bg5">Triangle Solid</a>
                    <a href="#" data-bg="bg6">Layered Hex</a>
                    <a href="#" data-bg="bg7">Circuit</a>
                </div>
            </div>
        </div>

        <!-- Main content -->
        <div class="container">

            <!-- My Services -->
            <div class="category">
                <h2>My Services</h2>
                <div class="button-container">
                    <a class="button" href="https://pufferpanel.webdash.dk">
                        <i class="fa-solid fa-server"></i>Webdash Hosting
                    </a>
                    <a class="button" href="https://webmgmt.webdash.dk">
                        <i class="fa-solid fa-server"></i>Webmin Web
                    </a>
                    <a class="button" href="https://hostmgmt.webdash.dk">
                        <i class="fa-solid fa-server"></i>Webmin Host
                    </a>
                    <a class="button" href="https://dockhand.webdash.dk">
                        <i class="fa-brands fa-docker"></i>Dockhand
                    </a>
                    <a class="button" href="https://pihole.webdash.dk">
                        <i class="fa-solid fa-shield-halved"></i>PiHole
                    </a>
                    <a class="button" href="https://scanopy.webdash.dk">
                        <i class="fa-solid fa-network-wired"></i>Scanopy
                    </a>
                    <a class="button" href="https://grafana.webdash.dk">
                        <i class="fa-solid fa-chart-line"></i>Grafana
                    </a>
                    <a class="button" href="https://dash.cloudflare.com/2ce23f195c2e878e8b362a4a58d36690/home/domains">
                        <i class="fa-brands fa-cloudflare"></i>CloudFlare
                    </a>
                </div>
            </div>

            <!-- Entertainment -->
            <div class="category">
                <h2>Entertainment</h2>
                <div class="button-container">
                    <a class="button" href="https://youtube.com">
                        <i class="fa-brands fa-youtube"></i>YouTube
                    </a>
                    <a class="button" href="https://www.disneyplus.com/da-dk/home">
                        <i class="fas fa-tv"></i>Disney+
                    </a>
                    <a class="button" href="https://www.netflix.com/browse">
                        <i class="fa-solid fa-tv"></i>Netflix
                    </a>
                    <a class="button" href="https://play.max.com">
                        <i class="fa-solid fa-tv"></i>HBO
                    </a>
                    <a class="button" href="https://primevideo.com">
                        <i class="fa-brands fa-amazon"></i>Prime Video
                    </a>
                    <a class="button" href="https://viaplay.dk">
                        <i class="fa-solid fa-tv"></i>Viaplay
                    </a>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>webdash.dk</p>
            <div class="socials">
                <a href="https://steamcommunity.com/id/SladeDK_/" title="Steam"><i class="fa-brands fa-steam"></i></a>
                <a href="https://www.facebook.com/frederik.haurum" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="https://x.com/SladeDK_" title="Twitter / X"><i class="fab fa-twitter"></i></a>
                <a href="https://www.instagram.com/frederik.haurum/" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://www.linkedin.com/in/frederikbruunhaurum/" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            </div>
        </div>
    </body>
</html>

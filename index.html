<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="default.jpg">
        <script src="https://kit.fontawesome.com/782d4dd7ab.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="backgrounds.css">
        <script src="script.js"></script>
        <title>WebDash</title>
    </head>

    <body>
        <!-- Header section with logo and title -->
        <div class="header">            

            <img src="default.jpg" alt="Logo">
            <h1>SladeDK</h1>
            
            <!-- User warning if JavaScript is disabled / blocked -->
            <noscript>
                <div class="noscript-alert">
                    JavaScript is disabled in your browser. Please enable JavaScript to view the full functionality of this website.
                </div>
            </noscript>

            <!-- Dropdown menu for different pages-->
            <div class="dropdownPages">
                <button class="dropdownPages-button"><i class="fa-solid fa-bars"></i> Pages</button>
                <div class="dropdownPages-content">
                    <a href="http://home.webdash.local">Home</a>
                    <a href="http://work.webdash.local">Work</a>
                </div>
            </div>
            
            <!-- Dropdown menu for different background themes -->
            <div class="dropdownThemes">
                <button class="dropdownThemes-button"><i class="fa-solid fa-paint-brush"></i> Themes</button>
                <div class="dropdownThemes-content">
                    <a href="#" data-bg="bg1">Blank</a>
                    <a href="#" data-bg="bg2">Squares Dotted</a>
                    <a href="#" data-bg="bg3">Webbed</a>
                    <a href="#" data-bg="bg4">Triangle Gradient</a>
                    <a href="#" data-bg="bg5">Triangle Solid</a>
                    <a href="#" data-bg="bg6">Layered Hex</a>
                    <a href="#" data-bg="bg7">Circuit</a>
                </div>
            </div>
        </div>

        <!-- Main content area with categories -->
        <div class="container">

            <!-- Category for Services -->
            <div class="category">
                <h2>My Services</h2>
                <div class="button-container">
                    <!-- Button for PufferPanel -->
                    <a class="button" href="http://web.webdash.local:8080">
                        <i class="fa-solid fa-server"></i>Webdash Hosting
                    </a>

                    <!-- Button for Cockpit -->
                    <a class="button" href="https://web.webdash.local:9090/system">
                        <i class="fa-solid fa-server"></i>Cockpit
                    </a>
                    
                    <!-- Button for Docker -->
                    <a class="button" href="https://web.webdash.local:9443">
                        <i class="fa-brands fa-docker"></i>Docker
                    </a>
                    
                    <!-- Button for PiHole -->
                    <a class="button" href="http://web.webdash.local:1010/admin">
                        <i class="fa-solid fa-shield-halved"></i>PiHole
                    </a>
                    
                    <!-- Button for IT-Tools -->
                    <a class="button" href="http://web.webdash.local:88/">
                        <i class="fa-solid fa-toolbox"></i>IT-Tools
                    </a>

                    <!-- Button for CloudFlare -->
                    <a class="button" href="https://dash.cloudflare.com/2ce23f195c2e878e8b362a4a58d36690/slade.one">
                        <i class="fa-brands fa-cloudflare"></i>CloudFlare
                    </a>
                </div>
            </div>
            
            <!-- Category for Entertainment -->
            <div class="category">
                <h2>Entertainment</h2>
                <div class="button-container">
                    <!-- Button for YouTube -->
                    <a class="button" href="https://youtube.com">
                        <i class="fa-brands fa-youtube"></i>YouTube
                    </a>

                    <!-- Button for Disney+ -->
                    <a class="button" href="https://www.disneyplus.com/da-dk/home">
                        <i class="fas fa-tv"></i>Disney+
                    </a>

                    <!-- Button for Netflix -->
                    <a class="button" href="https://www.netflix.com/browse">
                        <i class="fa-solid fa-tv"></i>Netflix
                    </a>

                    <!-- Button for HBO -->
                    <a class="button" href="https://play.max.com">
                        <i class="fa-solid fa-tv"></i>HBO
                    </a>

                    <!-- Button for Prime Video -->
                    <a class="button" href="https://primevideo.com">
                        <i class="fa-brands fa-amazon"></i>Prime Video
                    </a>

                    <!-- Button for Viaplay -->
                    <a class="button" href="https://viaplay.dk">
                        <i class="fa-solid fa-tv"></i>Viaplay
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Footer section with social media links -->
        <div class="footer">
            <div class="socials">
                <!-- Social media links with icons -->
                <a href="https://steamcommunity.com/id/SladeDK_/"><i class="fa-brands fa-steam"></i></a>
                <a href="https://www.facebook.com/frederik.haurum"><i class="fab fa-facebook-f"></i></a>
                <a href="https://x.com/SladeDK_"><i class="fab fa-twitter"></i></a>
                <a href="https://www.instagram.com/frederik.haurum/"><i class="fab fa-instagram"></i></a>
                <a href="https://www.linkedin.com/in/frederikbruunhaurum/"><i class="fab fa-linkedin-in"></i></a>
            </div>
        </div>
    </body>
</html>
